apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bitwarden-test
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/cubancodepath/homelab-argocd.git
      targetRevision: HEAD
      path: charts/homelab-app
      helm:
        valueFiles:
          - $values/apps/bitwarden-test/values.yaml
    - repoURL: https://github.com/cubancodepath/homelab-argocd.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/cubancodepath/homelab-argocd.git
      targetRevision: HEAD
      path: apps/bitwarden-test/config
  destination:
    server: https://kubernetes.default.svc
    namespace: bitwarden-test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
