apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bitwarden-test-secret
  namespace: bitwarden-test
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-global
    kind: ClusterSecretStore
  target:
    name: bitwarden-test-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: "DB_PASSWORD"
    - secretKey: API_KEY
      remoteRef:
        key: "API_KEY"
