# PersistentVolumeClaims para Runner 0
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-runner-0-data
  namespace: gitea
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-hdd
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-runner-0-cache
  namespace: gitea
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-hdd
  resources:
    requests:
      storage: 10Gi
---
# PersistentVolumeClaims para Runner 1
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-runner-1-data
  namespace: gitea
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-hdd
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-runner-1-cache
  namespace: gitea
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-hdd
  resources:
    requests:
      storage: 10Gi
---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-runner
  namespace: gitea
---
# Deployment para Runner 0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-runner-0
  namespace: gitea
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gitea-runner
      runner-id: "0"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea-runner
        runner-id: "0"
    spec:
      serviceAccountName: gitea-runner
      containers:
        # Runner principal
        - name: runner
          image: gitea/act_runner:0.2.11
          imagePullPolicy: IfNotPresent
          env:
            - name: GITEA_INSTANCE_URL
              value: "https://git.cubancodelab.net"
            - name: GITEA_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitea-runner-secret
                  key: GITEA_RUNNER_REGISTRATION_TOKEN
            - name: GITEA_RUNNER_NAME
              value: "homelab-runner-0"
            - name: DOCKER_HOST
              value: "tcp://localhost:2376"
            - name: DOCKER_TLS_VERIFY
              value: "1"
            - name: DOCKER_CERT_PATH
              value: "/certs/client"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: cache
              mountPath: /cache
            - name: docker-certs
              mountPath: /certs
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi

        # Docker-in-Docker sidecar
        - name: dind
          image: docker:dind
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: "/certs"
          volumeMounts:
            - name: docker-certs
              mountPath: /certs
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-runner-0-data
        - name: cache
          persistentVolumeClaim:
            claimName: gitea-runner-0-cache
        - name: docker-certs
          emptyDir: {}
---
