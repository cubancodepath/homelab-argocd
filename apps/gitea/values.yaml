# Gitea Helm Chart Configuration
# Reference: https://gitea.com/gitea/helm-chart

replicaCount: 1

image:
  repository: gitea/gitea
  tag: 1.21.4

# Service configuration
service:
  http:
    type: ClusterIP
    port: 3000
  ssh:
    type: ClusterIP
    port: 2222

# Ingress configuration - Traefik + cert-manager
ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "web,websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: git.cubancodelab.net
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: gitea-tls
      hosts:
        - git.cubancodelab.net

# Disable ALL subcharts - use external services only
postgresql-ha:
  enabled: false

redis-cluster:
  enabled: false

# Gitea configuration via environment variables and config
gitea:
  config:
    server:
      DOMAIN: git.cubancodelab.net
      SSH_DOMAIN: git.cubancodelab.net
      ROOT_URL: https://git.cubancodelab.net/
      SSH_PORT: 2222
      HTTP_PORT: 3000
      DISABLE_REGISTRATION: "false"
      ENABLE_GZIP: "true"
    database:
      DB_TYPE: postgres
      HOST: postgresql.database.svc.cluster.local:5432
      NAME: gitea
      USER: gitea
      SSL_MODE: disable
      # PASSWORD loaded from secret
    security:
      INSTALL_LOCK: "true"
      PASSWORD_HASH_ALGO: pbkdf2
    service:
      DISABLE_REGISTRATION: "false"
      ALLOW_REGISTRATION_WITHOUT_EMAIL: "true"
    session:
      PROVIDER: db
    cache:
      ADAPTER: memory
    log:
      MODE: console
      LEVEL: info

  # Use external secret for sensitive values
  existingSecret: gitea-config
  secretKey: database-password
  secretAdminKey: admin-password
  secretSecretKeyKey: secret-key
  secretInternalTokenKey: internal-token

# Persistence (for git repos and attachments)
persistence:
  enabled: true
  storageClassName: longhorn
  size: 20Gi
  mountPath: /data

# Resource limits
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi
