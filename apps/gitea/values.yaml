# Gitea Helm Chart Configuration - Using External PostgreSQL
# Reference: https://gitea.com/gitea/helm-chart
#
# This configuration uses an external PostgreSQL database instead of the
# embedded PostgreSQL-HA and Redis cluster included in the full chart.

replicaCount: 1

image:
  repository: gitea/gitea
  tag: 1.21.4

# Completely disable subcharts by using Bitnami's simpler Gitea chart
# Or by configuring the full chart with external databases

service:
  http:
    type: ClusterIP
    port: 3000
  ssh:
    type: ClusterIP
    port: 2222

# Ingress configuration - Traefik + cert-manager
ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "web,websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: git.cubancodelab.net
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: gitea-tls
      hosts:
        - git.cubancodelab.net

# Disable all bundled dependencies
postgresql:
  enabled: false

redis:
  enabled: false

memcached:
  enabled: false

# External database configuration
externalDatabase:
  type: postgres
  host: postgresql.database.svc.cluster.local
  port: 5432
  database: gitea
  user: gitea
  existingSecret: gitea-config
  existingSecretKey: database-password

# Gitea configuration
gitea:
  config:
    server:
      DOMAIN: git.cubancodelab.net
      SSH_DOMAIN: git.cubancodelab.net
      ROOT_URL: https://git.cubancodelab.net/
      SSH_PORT: 2222
      HTTP_PORT: 3000
      DISABLE_REGISTRATION: "false"
    security:
      INSTALL_LOCK: "true"
      PASSWORD_HASH_ALGO: pbkdf2
    service:
      DISABLE_REGISTRATION: "false"
      ALLOW_REGISTRATION_WITHOUT_EMAIL: "true"
    session:
      PROVIDER: db
    cache:
      ADAPTER: memory

# Persistence (for git repos and attachments)
persistence:
  enabled: true
  storageClassName: longhorn
  size: 20Gi

# Resource limits
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi
