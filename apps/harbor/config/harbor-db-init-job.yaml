apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-db-init
  namespace: harbor
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: public.ecr.aws/bitnami/postgresql:16.2.0-debian-12-r15
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: harbor-postgresql-secret
                  key: password
            - name: PGHOST
              value: postgresql.database.svc.cluster.local
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: postgres
            - name: PGDATABASE
              value: postgres
          command:
            - sh
            - -c
          args:
            - |
              set -euo pipefail
              create_db() {
                local db_name
                db_name="$1"
                if [ "$(psql -tAc "SELECT 1 FROM pg_database WHERE datname='${db_name}'")" != "1" ]; then
                  psql -v ON_ERROR_STOP=1 -c "CREATE DATABASE ${db_name}";
                fi
              }
              create_db registry
              create_db notary_server
              create_db notary_signer
