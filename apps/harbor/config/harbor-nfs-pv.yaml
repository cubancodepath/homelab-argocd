apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: harbor-registry-storage
  namespace: harbor
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-hdd
  resources:
    requests:
      storage: 100Gi
---
