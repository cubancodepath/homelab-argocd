apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: ghcr.io/immich-app/immich-charts
      chart: immich
      targetRevision: 0.11.1
      helm:
        valueFiles:
          - $values/apps/immich/values.yaml
    - repoURL: https://github.com/cubancodepath/homelab-argocd.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/cubancodepath/homelab-argocd.git
      targetRevision: HEAD
      path: apps/immich/config
  destination:
    server: https://kubernetes.default.svc
    namespace: immich
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
