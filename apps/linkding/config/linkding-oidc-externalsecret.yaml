apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: linkding-oidc-secret
  namespace: linkding
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-global
    kind: ClusterSecretStore
  target:
    name: linkding-oidc-secret
    creationPolicy: Owner
  data:
    - secretKey: OIDC_RP_CLIENT_SECRET
      remoteRef:
        key: "linkding-oidc-client-secret"
