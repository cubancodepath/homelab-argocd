---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: outline-allow-egress
  namespace: outline
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: outline
  policyTypes:
    - Egress
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Allow to Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: outline
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow to PostgreSQL
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
      ports:
        - protocol: TCP
          port: 5432
    # Allow to Authentik (for OIDC)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: authentik
      ports:
        - protocol: TCP
          port: 443
    # Allow to MinIO
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: storage
      ports:
        - protocol: TCP
          port: 9000
