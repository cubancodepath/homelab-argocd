url: "https://outline.cubancodelab.net"

# Redis bundled (lightweight, stateless)
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false

# Deshabilitar subcharts externos (usamos los del cluster)
postgresql:
  enabled: false
minio:
  enabled: false

# App secrets
secretKeyExternalSecret:
  name: "outline-app-secret"
  key: "secret-key"
utilsSecretExternalSecret:
  name: "outline-app-secret"
  key: "utils-secret"

# PostgreSQL global
externalPostgresql:
  host: "postgresql.database.svc.cluster.local"
  port: 5432
  username: "outline"
  database: "outline"
  existingSecret: "outline-db-secret"
  passwordSecretKey: "postgres-password"

database:
  sslMode: disable

# MinIO S3
fileStorage:
  mode: s3
  s3:
    existingSecret: "outline-minio-secret"
    accessKeyIdSecretKey: "access-key-id"
    secretAccessKeySecretKey: "secret-access-key"
    bucket: "outline"
    region: "us-east-1"
    bucketUrl: "https://minio.cubancodelab.net"
    forcePathStyle: true
    acl: private

# OIDC con Authentik
auth:
  oidc:
    enabled: true
    clientId: "rpM4pWEYyf8pVMqiVDOuEAJoatEQCt5tix73OKEp"
    authUri: "https://authentik-server.authentik.svc.cluster.local/application/o/authorize/"
    tokenUri: "https://authentik-server.authentik.svc.cluster.local/application/o/token/"
    userInfoUri: "https://authentik-server.authentik.svc.cluster.local/application/o/userinfo/"
    logoutUri: "https://authentik-server.authentik.svc.cluster.local/application/o/outline/end-session/"
    usernameClaim: "preferred_username"
    displayName: "Authentik"
    scopes:
      - openid
      - profile
      - email
    existingSecret:
      name: "outline-oidc-secret"
      clientSecretKey: "client-secret"

web:
  forceHttps: false

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: outline.cubancodelab.net
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: outline-tls
      hosts:
        - outline.cubancodelab.net

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi
