# Seerr - Request management for Plex/Jellyfin
seerr:
  enabled: true
  nameOverride: ""
  fullnameOverride: ""
  replicaCount: 1
  
  image:
    repository: ghcr.io/seerr-team/seerr
    tag: "v3.0.1"
    pullPolicy: IfNotPresent
  
  env:
    PUID: "1000"
    PGID: "1000"
    TZ: "Asia/Dubai"

  database:
    type: "postgres"
    postgres:
      host: "postgresql.database.svc.cluster.local"
      port: 5432
      user: "seerr"
      database: "seerr"
      existingSecret: "seerr-db-secret"
      passwordKey: "password"
  
  service:
    type: ClusterIP
    port: 5055
  
  ingress:
    enabled: true
    className: ""
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.entrypoints: "web,websecure"
    host: seerr.cubancodelab.net
    tls:
      enabled: true
      secretName: seerr-tls
  
  persistence:
    config:
      enabled: true
      size: 1Gi
      storageClass: "longhorn"
      existingClaim: ""
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  livenessProbe:
    httpGet:
      path: /api/v1/status
      port: 5055
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  
  readinessProbe:
    httpGet:
      path: /api/v1/status
      port: 5055
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  
  startupProbe:
    httpGet:
      path: /api/v1/status
      port: 5055
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 15
  
  nodeSelector: {}
  tolerations: []
  affinity: {}

