# Global values for the media stack
global:
  domain: cubancodelab.net
  storageClass: "longhorn"
  timezone: "Asia/Dubai"
  puid: "1000"
  pgid: "1000"

# Jellyfin - Media server
jellyfin:
  enabled: true
  nameOverride: ""
  fullnameOverride: ""
  replicaCount: 1
  
  image:
    repository: jellyfin/jellyfin
    tag: "10.10.7"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8096
  
  ingress:
    enabled: true
    className: ""
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.entrypoints: "web,websecure"
    hosts:
      - host: jellyfin.cubancodelab.net
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - jellyfin.cubancodelab.net
        secretName: jellyfin-tls
  
  persistence:
    config:
      enabled: true
      storageClass: "longhorn"
      accessMode: ReadWriteOnce
      size: 10Gi
    
    cache:
      emptyDir:
        sizeLimit: 5Gi
    
    media:
      enabled: true
      storageClass: ""
      accessMode: ReadWriteMany
      size: 100Gi
      existingClaim: "shared-media-pvc"
  
  env:
    JELLYFIN_PublishedServerUrl: "https://jellyfin.cubancodelab.net"
    TZ: "Asia/Dubai"
    
  extraEnv: []
  
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    runAsNonRoot: true
  
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
      gpu.intel.com/i915: 1
    requests:
      cpu: 500m
      memory: 1Gi
      gpu.intel.com/i915: 1
  
  hardwareAcceleration:
    enabled: true
    type: "intel"
    intel:
      enableDevices: true
      renderGroup: 993
  
  healthChecks:
    liveness:
      enabled: true
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
    
    readiness:
      enabled: true
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
      successThreshold: 1
    
    startup:
      enabled: true
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30
      successThreshold: 1
  
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  
  nodeSelector:
    gpu.intel.com/device-id.0300-46a6.present: "true"

